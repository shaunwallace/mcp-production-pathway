name: Deploy docs site

# Builds the Astro Starlight site in docs-site/ and deploys it to GitHub Pages.
#
# One-time setup in the target repo:
#   Settings → Pages → Source → "GitHub Actions"
#
# The workflow injects `SITE` and `BASE` via env so the same config works whether
# the repo is forked to username/mcp-workbook or anywhere else — no hardcoded URLs.

on:
  push:
    branches: [main]
    # Only rebuild when content or site config actually changes.
    paths:
      - "docs-site/**"
      - "README.md"
      - "PATHWAY.md"
      - "REPO-ARCHITECTURE.md"
      - "weeks/**"
      - "templates/**"
      - "docs/**"
      - "server/README.md"
      - "harness/README.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          BASE: ${{ steps.pages.outputs.base_path }}
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
